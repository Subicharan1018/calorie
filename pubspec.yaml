name: kalori
description: South Indian Calorie Deficit Tracker
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1

  # UI / Charts
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  gap: ^3.0.1
  google_fonts: ^6.2.1
  lottie: ^3.1.0
  haptic_feedback: ^0.5.1

  # Utilities
  shared_preferences: ^2.2.3
  envied: ^0.5.4+1
  intl: ^0.20.2
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  build_runner: ^2.4.9
  envied_generator: ^0.5.4+1

flutter:
  uses-material-design: true
